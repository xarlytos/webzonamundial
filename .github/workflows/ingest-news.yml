name: Ingest news (hourly)

# Free alternative to Vercel Pro crons. Hits the deployed cron endpoint
# every hour using the CRON_SECRET stored as a repo secret.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   - SITE_URL          e.g. https://www.zonamundial.app
#   - CRON_SECRET       must match the env var on Vercel

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: # allow manual run from the Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingest endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Missing SITE_URL or CRON_SECRET secrets"
            exit 1
          fi
          curl -fsSL -m 300 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/ingest-news" \
            -o response.json
          cat response.json
